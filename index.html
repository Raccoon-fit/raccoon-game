<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="免费、好玩的在线游戏集合地！game.raccoon.fit 提供一系列精致的网页游戏，随时随地开启你的游戏时间。">
    <title>软软的游戏库 - 纯玩无图版</title>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root {
            --primary: #6c5ce7;
            --primary-dark: #5b4fcf;
            --secondary: #00cec9;
            --accent: #fd79a8;
            --dark: #2d3436;
            --dark-light: #9aa4aa;
            --light: #eef2f4;
            --card-bg: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.08);
            --sidebar-width: 288px;
            --warning: #fdcb6e;
            --success: #00b894;
            --danger: #ff7675;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            color: var(--light);
            min-height: 100vh;
            overflow-x: hidden;
        }
        button, input, select { font: inherit; }
        a { color: inherit; text-decoration: none; }
        .bg-particles {
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
        }
        .particle {
            position: absolute;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.14);
        }
        .app-container { display: flex; min-height: 100vh; }
        .sidebar {
            width: var(--sidebar-width);
            position: fixed;
            inset: 0 auto 0 0;
            background: rgba(0, 0, 0, 0.28);
            backdrop-filter: blur(12px);
            border-right: 1px solid rgba(255, 255, 255, 0.08);
            display: flex;
            flex-direction: column;
            z-index: 20;
            transition: transform .3s ease;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 24px 20px 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }
        .logo-icon {
            width: 44px;
            height: 44px;
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 10px 24px rgba(108, 92, 231, 0.28);
            font-size: 20px;
        }
        .logo-text { font-size: 24px; font-weight: 800; letter-spacing: .5px; }
        .logo-subtitle { font-size: 12px; color: var(--dark-light); margin-top: 4px; }
        .user-profile {
            margin: 18px 12px;
            padding: 14px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-radius: 16px;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 20px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
        }
        .user-info h3 { font-size: 16px; margin-bottom: 4px; }
        .user-info p { font-size: 13px; color: var(--dark-light); }
        .user-tip { margin-top: 8px; font-size: 12px; color: var(--dark-light); }
        .nav-menu { flex: 1; padding: 0 12px 18px; overflow-y: auto; }
        .nav-section-title {
            padding: 12px 12px 10px;
            color: var(--dark-light);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .nav-item {
            width: 100%;
            border: 0;
            background: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 16px;
            border-radius: 12px;
            color: var(--light);
            cursor: pointer;
            transition: background .2s ease, transform .2s ease, color .2s ease;
            text-align: left;
            margin-bottom: 6px;
        }
        .nav-item:hover,
        .nav-item.active {
            background: rgba(108, 92, 231, 0.2);
            color: #ffffff;
            transform: translateX(4px);
        }
        .nav-icon { width: 22px; text-align: center; }
        .nav-text { font-size: 15px; font-weight: 600; }
        .nav-badge {
            margin-left: auto;
            min-width: 28px;
            padding: 2px 8px;
            border-radius: 999px;
            text-align: center;
            font-size: 12px;
            font-weight: 700;
            background: rgba(253, 121, 168, 0.22);
            color: #fff;
        }
        .sidebar-footer {
            padding: 16px 18px 24px;
            border-top: 1px solid rgba(255, 255, 255, 0.08);
            color: var(--dark-light);
            font-size: 12px;
            line-height: 1.6;
        }
        .main-content {
            flex: 1;
            margin-left: var(--sidebar-width);
            padding: 20px;
        }
        .top-bar,
        .panel,
        .welcome-banner,
        .game-card,
        .modal-card {
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.18);
        }
        .top-bar {
            border-radius: 18px;
            padding: 18px 22px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 22px;
        }
        .page-title h1 {
            font-size: 30px;
            background: linear-gradient(to right, #fff, #a29bfe, #81ecec);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .page-title p { color: var(--dark-light); margin-top: 6px; font-size: 14px; }
        .top-actions {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: flex-end;
            width: 100%;
        }
        .search-box,
        .sort-box {
            position: relative;
        }
        .search-box i,
        .sort-box i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dark-light);
            pointer-events: none;
        }
        .search-box input,
        .sort-box select {
            min-width: 220px;
            width: 100%;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 14px;
            background: rgba(255,255,255,.08);
            color: #fff;
            padding: 11px 14px 11px 40px;
            outline: none;
        }
        .sort-box select option { color: #111; }
        .search-box input:focus,
        .sort-box select:focus {
            border-color: rgba(108, 92, 231, 0.55);
            box-shadow: 0 0 0 3px rgba(108, 92, 231, 0.16);
        }
        .mobile-menu-btn,
        .ghost-btn,
        .primary-btn,
        .secondary-btn {
            border: 0;
            cursor: pointer;
            transition: transform .2s ease, background .2s ease, opacity .2s ease;
        }
        .mobile-menu-btn,
        .ghost-btn {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-radius: 14px;
            padding: 11px 14px;
        }
        .mobile-menu-btn { display: none; width: 44px; height: 44px; justify-content: center; align-items: center; }
        .ghost-btn:hover,
        .mobile-menu-btn:hover,
        .primary-btn:hover,
        .secondary-btn:hover { transform: translateY(-1px); }
        .primary-btn {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: #fff;
            border-radius: 14px;
            padding: 11px 16px;
        }
        .secondary-btn {
            background: rgba(255,255,255,.1);
            color: #fff;
            border-radius: 14px;
            padding: 11px 16px;
            border: 1px solid rgba(255,255,255,.1);
        }
        .welcome-banner {
            border-radius: 22px;
            padding: 26px 28px;
            margin-bottom: 20px;
            display: grid;
            grid-template-columns: 1.8fr 1fr;
            gap: 18px;
        }
        .welcome-content h2 { font-size: 28px; margin-bottom: 10px; }
        .welcome-content p { color: rgba(255,255,255,.78); line-height: 1.7; }
        .welcome-stats {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .stat-card {
            border-radius: 16px;
            padding: 16px;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.08);
        }
        .stat-label { color: var(--dark-light); font-size: 12px; margin-bottom: 8px; }
        .stat-value { font-size: 24px; font-weight: 800; }
        .panel {
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 18px;
        }
        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 14px;
        }
        .panel-header h2 { font-size: 22px; }
        .panel-header p { color: var(--dark-light); font-size: 14px; margin-top: 4px; }
        .panel-actions { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
        .status-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .status-chip-row,
        .recent-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .chip,
        .recent-chip {
            border-radius: 999px;
            padding: 8px 12px;
            background: rgba(255,255,255,.08);
            color: #fff;
            font-size: 13px;
            border: 1px solid rgba(255,255,255,.08);
        }
        .recent-chip button {
            border: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
            padding: 0;
        }
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 18px;
        }
        .game-card {
            border-radius: 20px;
            overflow: hidden;
            transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease;
        }
        .game-card:hover {
            transform: translateY(-6px);
            border-color: rgba(108, 92, 231, 0.45);
            box-shadow: 0 18px 38px rgba(0, 0, 0, 0.24);
        }
        .game-top {
            min-height: 170px;
            padding: 18px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            background: linear-gradient(135deg, rgba(108, 92, 231, 0.22), rgba(0, 206, 201, 0.12));
            border-bottom: 1px solid rgba(255,255,255,.06);
        }
        .game-flags {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
        }
        .game-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(253, 121, 168, 0.18);
            border: 1px solid rgba(253, 121, 168, 0.24);
            font-size: 12px;
            font-weight: 700;
        }
        .game-icon {
            width: 58px;
            height: 58px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,.12);
            border: 1px solid rgba(255,255,255,.1);
            font-size: 24px;
        }
        .game-summary h3 { font-size: 20px; margin-bottom: 8px; }
        .game-summary p { color: rgba(255,255,255,.78); line-height: 1.6; font-size: 14px; }
        .game-body { padding: 18px; }
        .game-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 14px;
            font-size: 13px;
            color: var(--dark-light);
        }
        .game-rating { color: var(--warning); font-weight: 700; }
        .game-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 16px;
        }
        .game-tag {
            padding: 5px 10px;
            border-radius: 999px;
            font-size: 12px;
            background: rgba(108, 92, 231, 0.14);
            color: #d9d1ff;
            border: 1px solid rgba(108, 92, 231, 0.18);
        }
        .game-actions { display: flex; gap: 10px; }
        .game-actions a,
        .game-actions button {
            flex: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            min-height: 42px;
            width: 100%;
        }
        .empty-state {
            display: none;
            padding: 28px 18px;
            border-radius: 16px;
            text-align: center;
            color: var(--dark-light);
            border: 1px dashed rgba(255,255,255,.14);
            background: rgba(255,255,255,.04);
        }
        .loading-placeholder {
            grid-column: 1 / -1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
            padding: 64px 20px;
            color: var(--dark-light);
        }
        .loading-spinner {
            width: 36px;
            height: 36px;
            border: 3px solid rgba(255,255,255,.12);
            border-top-color: var(--primary);
            border-radius: 999px;
            animation: spin .8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .footer {
            margin-top: 18px;
            padding: 22px;
            text-align: center;
            color: var(--dark-light);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,.08);
            background: rgba(255,255,255,.05);
        }
        .footer-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin-top: 12px;
        }
        .footer-links button {
            border: 0;
            background: transparent;
            color: inherit;
            cursor: pointer;
            padding: 0;
        }
        .modal {
            position: fixed;
            inset: 0;
            display: none;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.72);
            padding: 20px;
            z-index: 40;
        }
        .modal.open { display: flex; }
        .modal-card {
            width: min(720px, 100%);
            border-radius: 22px;
            padding: 24px;
        }
        .modal-header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 14px;
            margin-bottom: 14px;
        }
        .modal-title { font-size: 24px; }
        .modal-body { color: rgba(255,255,255,.84); line-height: 1.8; font-size: 15px; }
        .modal-body ul { padding-left: 20px; margin-top: 12px; }
        .modal-body li { margin-bottom: 8px; }
        .modal-actions { margin-top: 18px; display: flex; justify-content: flex-end; gap: 10px; }
        .backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.28);
            z-index: 10;
            display: none;
        }
        .backdrop.open { display: block; }
        .bottom-nav {
            display: none;
            position: fixed;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 25;
            padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
            background: rgba(10, 12, 28, 0.88);
            backdrop-filter: blur(16px);
            border-top: 1px solid rgba(255,255,255,.08);
            gap: 8px;
        }
        .bottom-nav button {
            flex: 1;
            min-height: 54px;
            border: 0;
            border-radius: 16px;
            background: rgba(255,255,255,.06);
            color: #fff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            font-size: 11px;
            cursor: pointer;
        }
        .bottom-nav button.active {
            background: rgba(108, 92, 231, 0.22);
            color: #ffffff;
        }
        .bottom-nav i { font-size: 16px; }
        /* TapTap 组件自适应 */
        .taptap-wrapper {
            margin-top: 12px;
            text-align: center;
            width: 100%;
        }
        .taptap-wrapper iframe {
            width: 100%;
            max-width: 470px;
            height: 76px;
            border: none;
        }
        @media (max-width: 1024px) {
            .sidebar { transform: translateX(-100%); width: min(84vw, 320px); }
            .sidebar.open { transform: translateX(0); }
            .main-content { margin-left: 0; padding: 16px; }
            .mobile-menu-btn { display: inline-flex; }
            .welcome-banner { grid-template-columns: 1fr; }
        }
        @media (max-width: 768px) {
            .top-bar { align-items: stretch; flex-direction: column; padding: 16px; }
            .page-title h1 { font-size: 24px; }
            .top-actions { justify-content: stretch; }
            .search-box, .sort-box { width: 100%; }
            .search-box input, .sort-box select { width: 100%; min-width: 0; }
            .panel, .welcome-banner, .footer, .modal-card { padding: 16px; }
            .panel-header, .status-row { flex-direction: column; align-items: flex-start; }
            .panel-actions { width: 100%; }
            .panel-actions button { flex: 1; }
            .game-actions { flex-direction: column; }
            .games-grid { grid-template-columns: 1fr; gap: 14px; }
            .welcome-stats { grid-template-columns: 1fr 1fr; }
            .status-chip-row, .recent-row { width: 100%; }
            .taptap-wrapper iframe { max-width: 100%; }
        }
        @media (max-width: 520px) {
            .main-content { padding: 12px 12px 96px; }
            .top-bar, .panel, .welcome-banner, .footer { border-radius: 16px; }
            .top-bar { gap: 12px; }
            .page-title p { font-size: 13px; }
            .welcome-content h2 { font-size: 22px; }
            .welcome-stats { grid-template-columns: 1fr; }
            .stat-value { font-size: 20px; }
            .game-top { min-height: 150px; padding: 16px; }
            .game-body { padding: 16px; }
            .game-summary h3 { font-size: 18px; }
            .game-summary p { font-size: 13px; }
            .game-meta { flex-direction: column; align-items: flex-start; }
            .chip, .recent-chip { width: 100%; }
            .recent-chip button { width: 100%; text-align: left; }
            .footer { margin-bottom: 8px; }
            .bottom-nav { display: flex; }
            .taptap-wrapper iframe { height: auto; min-height: 76px; }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>
    <div class="backdrop" id="sidebarBackdrop"></div>
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-icon"><i class="fas fa-gamepad"></i></div>
                <div>
                    <div class="logo-text">软软游戏库</div>
                    <div class="logo-subtitle">纯玩无图版 · 数据驱动重构</div>
                </div>
            </div>
            <div class="user-profile" id="profileCard">
                <div class="avatar" id="profileAvatar">玩</div>
                <div class="user-info">
                    <h3 id="playerName">网站玩家</h3>
                    <p id="playerMode">在线游戏库 · 无图极速版</p>
                    <div class="user-tip">双击此卡片可修改昵称</div>
                </div>
            </div>
            <nav class="nav-menu">
                <div class="nav-section-title">浏览</div>
                <button class="nav-item active" data-filter="all">
                    <span class="nav-icon"><i class="fas fa-home"></i></span>
                    <span class="nav-text">全部游戏</span>
                    <span class="nav-badge" id="gameCount">0</span>
                </button>
                <button class="nav-item" data-filter="featured">
                    <span class="nav-icon"><i class="fas fa-star"></i></span>
                    <span class="nav-text">精选游戏</span>
                </button>
                <button class="nav-item" data-filter="latest">
                    <span class="nav-icon"><i class="fas fa-sparkles"></i></span>
                    <span class="nav-text">最新上架</span>
                </button>
                <button class="nav-item" data-filter="casual">
                    <span class="nav-icon"><i class="fas fa-cloud"></i></span>
                    <span class="nav-text">休闲轻松</span>
                </button>
                <button class="nav-item" data-filter="strategy">
                    <span class="nav-icon"><i class="fas fa-chess"></i></span>
                    <span class="nav-text">策略益智</span>
                </button>
                <button class="nav-item" data-filter="space">
                    <span class="nav-icon"><i class="fas fa-rocket"></i></span>
                    <span class="nav-text">太空冒险</span>
                </button>
                <div class="nav-section-title">工具</div>
                <button class="nav-item" id="openAboutSidebar">
                    <span class="nav-icon"><i class="fas fa-circle-info"></i></span>
                    <span class="nav-text">关于网站</span>
                </button>
                <button class="nav-item" id="clearRecentSidebar">
                    <span class="nav-icon"><i class="fas fa-clock-rotate-left"></i></span>
                    <span class="nav-text">清空最近游玩</span>
                </button>
            </nav>
            <div class="sidebar-footer">
                <div>© 2025-2026 软软的游戏库</div>
                <div>纯享游戏 · 无图打扰</div>
                <div>新版逻辑可直接扩展游戏数据</div>
            </div>
        </aside>
        <main class="main-content">
            <div class="top-bar">
                <div class="page-title">
                    <h1>软软的游戏库</h1>
                    <p>在线游戏集合，点击即玩，无图极速体验，支持搜索、筛选、排序和最近游玩。</p>
                </div>
                <div class="top-actions">
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input id="searchInput" type="text" placeholder="搜索游戏名称、描述、标签...">
                    </div>
                    <div class="sort-box">
                        <i class="fas fa-arrow-down-wide-short"></i>
                        <select id="sortSelect" aria-label="排序方式">
                            <option value="featured">按推荐排序</option>
                            <option value="rating">按评分排序</option>
                            <option value="name">按名称排序</option>
                            <option value="version">按版本排序</option>
                        </select>

        function createParticles() {
            const count = 50;
            for (let i = 0; i < count; i += 1) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                const size = Math.random() * 4 + 1;
                particle.style.width = `${size}px`;
                particle.style.height = `${size}px`;
                particle.style.left = `${Math.random() * 100}%`;
                particle.style.top = `${Math.random() * 100}%`;
                particle.style.opacity = `${Math.random() * 0.45 + 0.08}`;
                particle.style.animation = `float ${Math.random() * 18 + 12}s ease-in-out ${Math.random() * 4}s infinite alternate`;
                dom.bgParticles.appendChild(particle);
            }
            const style = document.createElement('style');
            style.textContent = `
                @keyframes float {
                    0% { transform: translateY(0) translateX(0); }
                    25% { transform: translateY(-18px) translateX(10px); }
                    50% { transform: translateY(-9px) translateX(-8px); }
                    75% { transform: translateY(10px) translateX(14px); }
                    100% { transform: translateY(0) translateX(-4px); }
                }
            `;
            document.head.appendChild(style);
        }

        function getFilterLabel(filter) {
            const labels = {
                all: '全部',
                featured: '精选',
                latest: '最新',
                recent: '最近',
                casual: '休闲',
                strategy: '策略',
                space: '太空'
            };
            return labels[filter] || '全部';
        }

        function compareVersion(a, b) {
            const pa = a.split('.').map(Number);
            const pb = b.split('.').map(Number);
            const len = Math.max(pa.length, pb.length);
            for (let i = 0; i < len; i += 1) {
                const va = pa[i] || 0;
                const vb = pb[i] || 0;
                if (va !== vb) return vb - va;
            }
            return 0;
        }

        function getFilteredGames() {
            const recentIds = new Set(state.recent);
            return games
                .filter((game) => {
                    if (state.filter === 'recent') return recentIds.has(game.id);
                    const passFilter = state.filter === 'all' || game.categories.includes(state.filter);
                    const term = state.search.trim().toLowerCase();
                    if (!term) return passFilter;
                    const haystack = [game.title, game.description, ...game.tags].join(' ').toLowerCase();
                    return passFilter && haystack.includes(term);
                })
                .sort((a, b) => {
                    if (state.sort === 'rating') return b.rating - a.rating;
                    if (state.sort === 'name') return a.title.localeCompare(b.title, 'zh-CN');
                    if (state.sort === 'version') return compareVersion(a.version, b.version);
                    if (state.sort === 'featured') return a.featuredOrder - b.featuredOrder;
                    return a.latestOrder - b.latestOrder;
                });
        }

        function trackRecent(gameId) {
            state.recent = [gameId, ...state.recent.filter((id) => id !== gameId)].slice(0, 4);
            localStorage.setItem('rr_game_recent', JSON.stringify(state.recent));
            renderRecent();
            updateStats(getFilteredGames());
        }

        function renderGames() {
            const loadingEl = document.getElementById('loadingPlaceholder');
            if (loadingEl) loadingEl.style.display = 'none';
            const filtered = getFilteredGames();
            dom.gamesGrid.innerHTML = filtered.map((game) => `
                <article class="game-card" data-game-id="${game.id}">
                    <div class="game-top">
                        <div class="game-flags">
                            <span class="game-badge"><i class="fas fa-bolt"></i><span>${game.badge}</span></span>
                            <div class="game-icon"><i class="fas ${game.icon}"></i></div>
                        </div>
                        <div class="game-summary">
                            <h3>${game.title}</h3>
                            <p>${game.description}</p>
                        </div>
                    </div>
                    <div class="game-body">
                        <div class="game-meta">
                            <span class="game-rating"><i class="fas fa-star"></i> ${game.rating.toFixed(1)}</span>
                            <span>v${game.version}</span>
                        </div>
                        <div class="game-tags">
                            ${game.tags.map((tag) => `<span class="game-tag">${tag}</span>`).join('')}
                        </div>
                        <div class="game-actions">
                            <a class="primary-btn play-link" href="${game.href}" ${game.external ? 'target="_blank" rel="noopener noreferrer"' : ''} data-game-id="${game.id}">
                                <i class="fas fa-play"></i><span>开始游玩</span>
                            </a>
                            <button class="secondary-btn detail-btn" data-game-id="${game.id}">
                                <i class="fas fa-circle-info"></i><span>查看详情</span>
                            </button>
                        </div>
                        ${game.id === 'taofeng' ? `<div class="taptap-wrapper"><iframe src="//www.taptap.cn/widget/883268?platform=android" frameborder="0" width="470" height="76" loading="lazy"></iframe></div>` : ''}
                    </div>
                </article>
            `).join('');

            dom.emptyState.style.display = filtered.length ? 'none' : 'block';
            bindGameActions();
            updateStats(filtered);
        }

        function updateStats(filtered) {
            dom.totalCount.textContent = String(games.length);
            dom.gameCount.textContent = String(games.length);
            dom.visibleCount.textContent = String(filtered.length);
            dom.recentCount.textContent = String(state.recent.length);
            dom.activeFilterLabel.textContent = getFilterLabel(state.filter);
            renderStatusChips(filtered);
        }

        function renderStatusChips(filtered) {
            const chips = [
                `筛选：${getFilterLabel(state.filter)}`,
                `排序：${dom.sortSelect.options[dom.sortSelect.selectedIndex].text}`,
                state.search ? `搜索：${state.search}` : '搜索：全部',
                `结果：${filtered.length} / ${games.length}`
            ];
            dom.statusChips.innerHTML = chips.map((text) => `<span class="chip">${text}</span>`).join('');
        }

        function renderRecent() {
            if (!state.recent.length) {
                dom.recentRow.innerHTML = '<span class="chip">最近游玩：暂无</span>';
                return;
            }
            const html = state.recent.map((id) => {
                const game = games.find((item) => item.id === id);
                if (!game) return '';
                return `<span class="recent-chip"><button type="button" data-recent-id="${game.id}">最近游玩：${game.title}</button></span>`;
            }).join('');
            dom.recentRow.innerHTML = html;
            dom.recentRow.querySelectorAll('[data-recent-id]').forEach((button) => {
                button.addEventListener('click', () => {
                    const game = games.find((item) => item.id === button.dataset.recentId);
                    if (!game) return;
                    window.open(game.href, game.external ? '_blank' : '_self', game.external ? 'noopener' : undefined);
                    trackRecent(game.id);
                });
            });
        }

        function openModal(title, body) {
            dom.modalTitle.textContent = title;
            dom.modalBody.innerHTML = body;
            dom.infoModal.classList.add('open');
            dom.infoModal.setAttribute('aria-hidden', 'false');

            dom.infoModal.classList.remove('open');
            dom.infoModal.setAttribute('aria-hidden', 'true');

        function showGameDetail(gameId) {
            const game = games.find((item) => item.id === gameId);
            if (!game) return;
            openModal(
                game.title,
                `
                    <p>${game.description}</p>
                    <ul>
                        <li>评分：${game.rating.toFixed(1)}</li>
                        <li>版本：v${game.version}</li>
                        <li>标签：${game.tags.join(' / ')}</li>
                        <li>分类：${game.categories.map(getFilterLabel).join(' / ')}</li>
                    </ul>
                `
            );
        }

        function bindGameActions() {
            dom.gamesGrid.querySelectorAll('.play-link').forEach((link) => {
                link.addEventListener('click', () => trackRecent(link.dataset.gameId));
            });
            dom.gamesGrid.querySelectorAll('.detail-btn').forEach((button) => {
                button.addEventListener('click', () => showGameDetail(button.dataset.gameId));
            });
        }

        function setFilter(filter) {
            state.filter = filter;
            dom.navItems.forEach((item) => item.classList.toggle('active', item.dataset.filter === filter));
            updateBottomNavActive();
            renderGames();
            if (window.innerWidth <= 1024) closeSidebar();
        }

        function updateBottomNavActive() {
            const tabFilters = ['featured', 'latest', 'recent'];
            dom.bottomButtons.forEach((btn) => {
                const action = btn.dataset.bottomAction;
                const tabActive = action === state.filter;
                const fallbackActive = action === 'all' && !tabFilters.includes(state.filter);
                btn.classList.toggle('active', tabActive || fallbackActive);
            });
        }

        function resetFilters() {
            state.filter = 'all';
            state.search = '';
            state.sort = 'featured';
            dom.searchInput.value = '';
            dom.sortSelect.value = 'featured';
            setFilter('all');
        }

        function openSidebar() {
            dom.sidebar.classList.add('open');
            dom.sidebarBackdrop.classList.add('open');
            document.body.style.overflow = 'hidden';
        }

        function closeSidebar() {
            dom.sidebar.classList.remove('open');
            dom.sidebarBackdrop.classList.remove('open');
            document.body.style.overflow = '';
        }

        function setupProfile() {
            dom.playerName.textContent = state.nickname;
            dom.profileAvatar.textContent = state.nickname.trim().slice(0, 1) || '玩';
            dom.profileCard.addEventListener('dblclick', () => {
                const next = prompt('输入你的昵称：', state.nickname);
                if (!next) return;
                const trimmed = next.trim();
                if (!trimmed) return;
                state.nickname = trimmed;
                localStorage.setItem('rr_game_nickname', trimmed);
                dom.playerName.textContent = trimmed;
                dom.profileAvatar.textContent = trimmed.slice(0, 1);
            });
        }

        function setupEvents() {
            dom.searchInput.addEventListener('input', (event) => {
                state.search = event.target.value;
                renderGames();
            });
            dom.sortSelect.addEventListener('change', (event) => {
                state.sort = event.target.value;
                renderGames();
            });
            dom.resetFiltersBtn.addEventListener('click', resetFilters);
            dom.showFeaturedBtn.addEventListener('click', () => setFilter('featured'));
            dom.showLatestBtn.addEventListener('click', () => setFilter('latest'));
            dom.navItems.forEach((item) => item.addEventListener('click', () => setFilter(item.dataset.filter)));
            dom.mobileMenuBtn.addEventListener('click', openSidebar);
            dom.sidebarBackdrop.addEventListener('click', closeSidebar);
            dom.closeModalBtn.addEventListener('click', closeModal);
            dom.confirmModalBtn.addEventListener('click', closeModal);
            dom.infoModal.addEventListener('click', (event) => {
                if (event.target === dom.infoModal) closeModal();
            });
            document.addEventListener('keydown', (event) => {
                if (event.key === 'Escape') {
                    closeModal();
                    closeSidebar();
                }
            });

            window.addEventListener('resize', () => {
                if (window.innerWidth > 1024) {
                    closeSidebar();
                }
            });

            dom.aboutBtn.addEventListener('click', () => openModal(modalContentMap.about.title, modalContentMap.about.body));
            dom.contactBtn.addEventListener('click', () => openModal(modalContentMap.contact.title, modalContentMap.contact.body));
            dom.privacyBtn.addEventListener('click', () => openModal(modalContentMap.privacy.title, modalContentMap.privacy.body));
            dom.termsBtn.addEventListener('click', () => openModal(modalContentMap.terms.title, modalContentMap.terms.body));
            dom.openAboutSidebar.addEventListener('click', () => openModal(modalContentMap.about.title, modalContentMap.about.body));
            dom.clearRecentSidebar.addEventListener('click', () => {
                state.recent = [];
                localStorage.removeItem('rr_game_recent');
                renderRecent();
                updateStats(getFilteredGames());
            });

            dom.bottomButtons.forEach((btn) => {
                btn.addEventListener('click', () => {
                    const action = btn.dataset.bottomAction;
                    if (action === 'menu') {
                        openSidebar();
                        return;
                    }
                    if (action === 'recent') {
                        state.filter = 'recent';
                        updateBottomNavActive();
                        dom.navItems.forEach((item) => item.classList.remove('active'));
                        renderGames();
                        return;
                    }
                    setFilter(action);
                });
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            createParticles();
            setupProfile();
            setupEvents();
            renderRecent();
            updateBottomNavActive();
            renderGames();
        });
    </script>
</body>
</html>
